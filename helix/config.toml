theme = "catppuccin_mocha"

[editor]
scrolloff = 8
mouse = false
line-number = "relative"
true-color = true
color-modes = true
cursorline = true

[editor.lsp]
display-messages = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.whitespace.render]
newline = "all"

[editor.indent-guides]
render = true
