import:
  - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml

window:
  # padding:
  #   x: 2
  #   y: 2
  dynamic_title: false
  opacity: 0.76
  decorations: full
  startup_mode: Windowed

font:
  normal:
    family: Iosevka Fixed
    style: Regular
  bold:
    family: Iosevka Fixed
    style: Bold
  italic:
    family: Iosevka Fixed
    style: Italic
  bold_italic:
    family: Iosevka Fixed
    style: Bold Italic
  size: 10.0

cursor:
  style:
    style: Block
