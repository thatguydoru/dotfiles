import:
  # uncomment the flavour you want below:
  - ~/.config/alacritty/catppuccin/catppuccin-mocha.yml
#  - ~/.config/alacritty/catppuccin/catppuccin-macchiato.yml
#  - ~/.config/alacritty/catppuccin/catppuccin-frappe.yml
#  - ~/.config/alacritty/catppuccin/catppuccin-latte.yml

env:
  TERM: xterm-256color

window:
  # padding:
  #   x: 5
  #   y: 3
  dynamic_title: false
  opacity: 0.70

font:
  normal:
    family: CommitMono
    style: Regular
  bold:
    family: CommitMono
    style: Bold
  italic:
    family: CommitMono
    style: Italic
  bold_italic:
    family: CommitMono
    style: Bold Italic
  size: 10.0

cursor:
  style:
    style: Block
